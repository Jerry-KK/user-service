server:
  servlet:
    context-path: /user  # 服务自身前缀
spring:
  application:
    name: user-service
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere.yml
  cloud:
    nacos:
      server-addr: 192.168.1.4:8848,192.168.1.4:8850,192.168.1.4:8852
      username: 'nacos'
      password: 'nacos'
      discovery:
        group: dms-practice
  #      config:
#        group: dms-practice
#        namespace: public
#        prefix: user-service
#        file-extension: yml
    loadbalancer:
      nacos:
        enabled: true
  config:
    import:
      - nacos:user-service.yml?group=dms-practice&namespace=public
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL 日志
